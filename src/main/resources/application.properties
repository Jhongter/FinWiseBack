spring.application.name=springboot-usuario-jwt

server.port=8081

# H2 Database
spring.datasource.url=jdbc:h2:mem:usuariosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html

# Necessário para o data.sql rodar após o Hibernate criar as tabelas
spring.jpa.defer-datasource-initialization=true

# Mensagens de erro detalhadas (útil em desenvolvimento)
server.error.include-message=always

# ----------------------------------------
# JWT
# IMPORTANTE: troque jwt.secret por um valor secreto longo em produção!
# ----------------------------------------
jwt.secret=minha-chave-super-secreta-que-deve-ter-pelo-menos-32-caracteres
jwt.expiration-ms=86400000
