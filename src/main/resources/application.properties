spring.application.name=springboot-usuario-jwt
server.port=${PORT:8081}

# ── PostgreSQL ────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finwise}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Swagger ──────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
server.error.include-message=always

# ── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:minha-chave-super-secreta-que-deve-ter-pelo-menos-32-caracteres}
jwt.expiration-ms=86400000

# ── E-mail (Resend — API HTTP, compatível com Render) ────
# Crie sua conta em https://resend.com e gere uma API Key
# Para testar sem domínio próprio, use remetente: onboarding@resend.dev
# (apenas envia para o e-mail cadastrado na sua conta Resend)
resend.api.key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:onboarding@resend.dev}

# URL do frontend (usada nos links dos e-mails)
app.url=${APP_URL:https://extraordinary-clafoutis-6fa598.netlify.app}
