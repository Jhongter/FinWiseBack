spring.application.name=springboot-usuario-jwt

server.port=${PORT:8081}

# ─────────────────────────────────────────────────────────
# PostgreSQL
# Em produção defina as variáveis de ambiente:
#   DB_URL       → jdbc:postgresql://<host>:<porta>/<banco>
#   DB_USERNAME  → usuário do banco
#   DB_PASSWORD  → senha do banco
#
# Localmente você pode criar um .env ou setar as vars antes
# de rodar: export DB_URL=jdbc:postgresql://localhost:5432/finwise
# ─────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finwise}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões (HikariCP — padrão do Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─────────────────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────────────────
# "update" cria/atualiza tabelas automaticamente.
# Em produção use "validate" e gerencie migrações com Flyway.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Garante que o data.sql rode depois do Hibernate criar as tabelas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ─────────────────────────────────────────────────────────
# Swagger / OpenAPI
# ─────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html

# Mensagens de erro detalhadas (remova em produção se quiser)
server.error.include-message=always

# ─────────────────────────────────────────────────────────
# JWT
# IMPORTANTE: troque jwt.secret por um valor longo e aleatório!
# Em produção use a variável de ambiente JWT_SECRET.
# ─────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:minha-chave-super-secreta-que-deve-ter-pelo-menos-32-caracteres}
jwt.expiration-ms=86400000
