spring.application.name=springboot-usuario-jwt
server.port=${PORT:8081}

# ── PostgreSQL ────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finwise}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Swagger ──────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
server.error.include-message=always

# ── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:minha-chave-super-secreta-que-deve-ter-pelo-menos-32-caracteres}
jwt.expiration-ms=86400000

# ── E-mail (Gmail SMTP) ───────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# URL do frontend (usada nos links dos e-mails)
app.url=${APP_URL:https://finwise-gestaofinanceira.netlify.app}
